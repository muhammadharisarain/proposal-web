<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b9d" />
    <title>Will you be Haris's Date?</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%A4%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <!-- Floating hearts background layer -->
    <div class="hearts" aria-hidden="true"></div>

    <!-- Main proposal card -->
    <main class="card" id="card" role="dialog" aria-labelledby="proposal-title">
      <div class="emoji-bounce" aria-hidden="true">💖</div>
      <h1 id="proposal-title" class="title">
        Will you be <span class="accent">Haris's</span> Date / GF?
      </h1>
      <p class="subtitle">Choose wisely. (One option is non-negotiable.)</p>

      <div class="actions" id="actions">
        <button id="yes-btn" class="btn btn-yes" type="button">
          Hell Yes <span aria-hidden="true">❤️</span>
        </button>
        <button id="no-btn" class="btn btn-no" type="button">
          Fuck No <span aria-hidden="true">😤</span>
        </button>
      </div>
    </main>

    <!-- Success screen (revealed when Yes is clicked) -->
    <section class="success" id="success" aria-hidden="true">
      <div class="confetti" id="confetti" aria-hidden="true"></div>
      <div class="success-inner">
        <div class="big-heart" aria-hidden="true">❤️</div>
        <h1 class="success-title">I knew you had a crush on me <span>😏❤️</span></h1>
        <p class="success-sub">You had no choice anyway <span>😌</span></p>
        <button id="again-btn" class="btn btn-yes btn-small" type="button">
          Aww, ask me again <span aria-hidden="true">🥰</span>
        </button>
      </div>
    </section>

    <script src="script.js" defer></script>
  </body>
</html>
